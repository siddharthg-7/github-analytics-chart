name: Update GitHub Analytics Chart

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Generate Chart
        run: python src/generate_chart.py

      - name: Commit & Push Chart
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if [ -f "charts/monthly_commits.png" ]; then
            git add charts/monthly_commits.png
            git commit -m "Update monthly analytics chart" || echo "No changes"
            git push
          else
            echo "Chart not generated, skipping commit."
          fi
